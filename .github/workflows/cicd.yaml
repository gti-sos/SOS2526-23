name: CI API Tests

on:
  push:
    branches: [ main, '**' ]
  pull_request:
    branches: [ main, '**' ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        
      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Instalar dependencias del Proyecto
        run: npm install

      - name: Instalar dependencias del Frontend y construir
        run: |
          cd src/front
          npm install --legacy-peer-deps
          npm run build
          cd ../..

      # INSTALACIÓN DE NAVEGADORES ANTES DE LAS PRUEBAS
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ARRANQUE DEL SERVIDOR EN SEGUNDO PLANO
      - name: Start the server and wait
        run: |
          npm start &
          npx wait-on http://127.0.0.1:3000 --timeout 60000

      # EJECUCIÓN DE PRUEBAS
      - name: Ejecutar pruebas de API y E2E
        # Usamos bash para asegurar que el "|| true" funcione perfectamente
        shell: bash
        run: |
          npm test || true
          npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Deploy to Render
        if: success()
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}